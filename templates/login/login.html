<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Humanos</title>

    <link rel="stylesheet" href="../../static/login/login.css">
</head>

<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <form method="post">
        {% csrf_token %}
        <h3>Bienvenido</h3>

        <label for="username">Nombre:</label>
        <input type="text" id="username" name="username" placeholder="Nombre" required>
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="Contraseña" required><br><br>

        <div id="hidden-value">
            <p id="error-message" class="hidden error-message">error</p>
        </div>


        <button type="submit">Aceptar</button>
    </form>

    {% if error_message %}
    <p style="color: red;">{{ error_message }}</p>
    {% endif %}


    <script>

        const form = document.querySelector('form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitButton = document.getElementById('submit-button');
        const hiddenValue = document.getElementById('hidden-value').dataset.hiddenValue;
        const errorMessage = document.getElementById('error-message');

        // Validaciones
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 3000);
        }

        form.addEventListener('submit', event => {
            event.preventDefault();
            if(validateData()){
                login();
            }

        })



        function validateData() {
            let isValid = true;
            const usernameRegex = /^[a-zA-Z\s]+$/;
            const passwordRegex = /(?=.*\d)(?=.*[\u0021-\u002b\u003c-\u0040])(?=.*[A-Z])(?=.*[a-z])\S{8,16}$/;


            // Validar Nombre
            if (!usernameRegex.test(usernameInput.value)) {
                isValid = false;
                showError('El nombre no cumple con los requisitos');
            }

            // Validar Contraseña
            if (!passwordRegex.test(passwordInput.value)) {
                isValid = false;
                showError('Contraseña no cumple con los requisitos');
            }

            return isValid;
        }

        async function login(){
            let name = usernameInput.value;
            let password = passwordInput.value;

            let user = {
                username: name,
                password: password
               }
                try {
                    const response = await fetch("{% url 'login' %}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{csrf_token}}',
                        },
                        body: JSON.stringify(user),
                    });

                    response.json().then(data => {
                        console.log(data);
                        if (data.ok) {
                            if (data.adress) {
                                window.location.href = data.adress
                                document.cookie  = data.auth.key+ "=" +data.auth.value
                            } else { window.location.href = '' }
                        } else {
                            showError('Usuario o contraseña icorrecta');
                        }
                    }
                    )


                } catch (error) {
                    showError('Error inesperado');
                }
        }

    </script>

</body>

</html>
