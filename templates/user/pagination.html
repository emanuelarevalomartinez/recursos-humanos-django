<div class="flex mt-4 justify-center">
    <div class="flex space-x-1">
        {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}"
           class="rounded-md border border-slate-500 py-2 px-3 text-center text-sm transition-all shadow-sm hover:shadow-lg text-slate-600 hover:text-white hover:bg-slate-800 hover:border-slate-800 focus:text-white focus:bg-slate-800 focus:border-slate-800 active:border-slate-800 active:text-white active:bg-slate-800 ml-2">
            Previo
        </a>
        {% else %}
        <button disabled
           class="rounded-md border border-slate-500 py-2 px-3 text-center text-sm text-black cursor-not-allowed opacity-50 ml-2">
            Previo
        </button>
        {% endif %}
    
        {% for num in page_obj.paginator.page_range %}
            {% if num == page_obj.number %}
            <span
               class="min-w-9 rounded-md bg-slate-600 py-2 px-3 text-center text-sm text-white shadow-md ml-2">
                {{ num }} de {{ num_pages }}
            </span>
            {% endif %}
        {% endfor %}

        
    
        {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}"
           class="rounded-md border border-slate-500 py-2 px-3 text-center text-sm transition-all shadow-sm hover:shadow-lg text-black hover:text-white hover:bg-slate-800 hover:border-slate-800 focus:text-white focus:bg-slate-800 focus:border-slate-800 active:border-slate-800 active:text-white active:bg-slate-800 ml-2">
           Siguiente
        </a>
        {% else %}
        <button disabled
           class="rounded-md border border-slate-500 py-2 px-3 text-center text-sm text-black cursor-not-allowed opacity-50 ml-2">
            Siguiente
        </button>
        {% endif %}
    </div>
  
</div>
