
{% extends "base.html" %}

{% load static %}

{% block content %}

<div id="genericModal" class="fixed inset-0 z-50 items-center justify-center overflow-hidden hidden">
    <div class="fixed inset-0 bg-black/50 cursor-pointer"></div>
    <div class="relative w-full max-w-sm p-4 bg-gray-800 rounded-xl mx-auto z-10">

        <!-- Modal content -->
        <div class="flex flex-col space-y-2 text-center text-white items-center">
            <img id="imgGenericModal" class="h-8 w-8" src="" alt="Confirm Icon">
            <p id="messageGenericModal" class="text-white"></p>
        </div>

        <!-- Modal actions -->
        <div class="mt-4 grid gap-2 grid-cols-1">
                 
                <button id="confirmDelete" onclick="hiddenGenericModal()"
                    class="bg-blue-600 py-2 px-4 rounded-md text-white hover:bg-blue-700 focus:ring-2 focus:ring-offset-2 focus:ring-blue-600">
                    Aceptar
                </button>
            </div>
           
    </div>
</div>



{% endblock %}
