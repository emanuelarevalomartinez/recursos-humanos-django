
{% extends "base.html" %}

{% load static %}

{% block content %}

<div id="historyModal" class="fixed inset-0 z-50 items-center justify-center hidden">
    <!-- Fondo opaco -->
    <div onclick="hideHistoryModal()" class="fixed inset-0 bg-black/50 cursor-pointer"></div>

    <!-- Contenido del modal -->
    <div class="relative pb-2 pt-4 m-auto px-6 max-w-5xl w-full h-4/5 bg-gray-800 bg-opacity-30 rounded-lg shadow-lg backdrop-blur-xl backdrop-filter">
        <form class="flex flex-col h-full">
            <div class="flex flex-col gap-2 h-5/6 text-white">
                <div class="flex w-full justify-between">
                    <div class="flex gap-1">
                        <select id="select_ae2_ae3" required class=" rounded-md border border-[#e0e0e0] bg-white px-8 text-base font-medium text-black outline-none focus:border-[#6A64F1] focus:shadow-md">
                            <option class="bg-white border rounded-lg shadow border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 py-2 px-4 block w-full appearance-none leading-normal"  value=""></option>
                            <option class="bg-white border rounded-lg shadow border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 py-2 px-4 block w-full appearance-none leading-normal"  value="ae2">AE2</option>
                            <option class="bg-white border rounded-lg shadow border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 py-2 px-4 block w-full appearance-none leading-normal" value="ae3">AE3</option>
                        </select>
                        <select id="select_ColumnsData" required class="w-11/12 rounded-md border border-[#e0e0e0] bg-white px-8 text-base font-medium text-black outline-none focus:border-[#6A64F1] focus:shadow-md">
                            <option class="bg-white border rounded-lg shadow border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500 py-2 px-4 block w-full appearance-none leading-normal"  value=""></option>
                        </select>
                    </div>

                    <div class="flex mx-4 items-center">
                                <label for="date" class="text-base px-4 font-medium text-white">
                                    Desde
                                </label>
                                <input type="date" name="since" id="since" required
                                    class="w-full rounded-md border border-[#e0e0e0] bg-white px-4 text-base font-medium text-black outline-none focus:border-[#6A64F1] focus:shadow-md"/>
                                    <label for="date" class="text-base px-4 font-medium text-white">
                                        Hasta
                                    </label>
                                    <input type="date" name="until" id="until" required
                                        class="w-full rounded-md border border-[#e0e0e0] bg-white px-4 text-base font-medium text-black outline-none focus:border-[#6A64F1] focus:shadow-md"/>
                    </div>
                </div>
               
                <div id="chart" class="flex-grow w-full text-white"></div>
            </div>
            <div class="flex gap-2 w-2/3 m-auto h-1/6 items-center">
                <button onclick="hideHistoryModal()" class="bg-red-600 hover:bg-red-700 text-gray-200 font-semibold py-2 rounded-lg shadow-md transition duration-300 ease-in-out w-1/2 h-10" 
                    type="button">Cerrar</button>
                <button class="bg-blue-600 hover:bg-blue-700 text-gray-200 font-semibold py-2 rounded-lg shadow-md hover:shadow-lg transition duration-300 ease-in-out h-10 w-1/2" 
                    type="submit">Graficar</button>
            </div>
            
           
        </form>
    </div>
</div>

{% endblock %}
